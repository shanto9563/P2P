<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>P2P File Share</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>
<body>
  <div id="app">
    <div id="loading-overlay" class="overlay"><div class="spinner"></div><p>Connecting...</p></div>

    <div id="main-container" class="container" style="display:none;">
      <header class="glass">
        <h1>P2P File Share</h1>
        <div id="connection-status" class="status-dot" title="Connection"></div>
      </header>

      <!-- Room creation / join -->
      <div id="room-panel" class="glass card">
        <div class="tabs">
          <button id="tab-create" class="tab active">Create Room</button>
          <button id="tab-join" class="tab">Join Room</button>
        </div>
        <div id="create-section" class="tab-content">
          <input type="text" id="custom-room-id" placeholder="Custom Room ID (optional)" maxlength="20">
          <input type="password" id="create-password" placeholder="Password (optional)">
          <input type="text" id="create-nickname" placeholder="Your nickname" maxlength="20">
          <button id="btn-create-room" class="btn primary">Create Room</button>
        </div>
        <div id="join-section" class="tab-content" style="display:none;">
          <input type="text" id="join-room-id" placeholder="Room ID" maxlength="20">
          <input type="password" id="join-password" placeholder="Password (if any)">
          <input type="text" id="join-nickname" placeholder="Your nickname" maxlength="20">
          <button id="btn-join-room" class="btn primary">Join Room</button>
        </div>
      </div>

      <!-- In‑room UI -->
      <div id="room-ui" style="display:none;">
        <div class="room-header glass">
          <h2>Room: <span id="room-id-display"></span></h2>
          <div class="room-actions">
            <button id="btn-copy-link" class="btn small" title="Copy link">📋 Copy Link</button>
            <button id="btn-show-qr" class="btn small" title="QR Code">📱 QR</button>
            <button id="btn-lock-room" class="btn small" title="Lock room">🔒</button>
            <button id="btn-leave-room" class="btn small danger">Leave</button>
          </div>
        </div>
        <div class="room-content">
          <div class="sidebar glass">
            <h3>Users</h3>
            <ul id="user-list"></ul>
          </div>
          <div class="main-area">
            <div class="chat-section glass">
              <div id="chat-messages" class="chat-messages"></div>
              <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Type a message...">
                <button id="btn-send-chat" class="btn">Send</button>
              </div>
            </div>
            <div class="file-section glass">
              <div class="file-actions">
                <button id="btn-select-files" class="btn">Select Files</button>
                <button id="btn-select-folder" class="btn">Select Folder</button>
                <span id="send-to-label">Send to:</span>
                <select id="recipient-select" multiple size="1"><option value="all" selected>Everyone</option></select>
                <button id="btn-send-files" class="btn primary" disabled>Send</button>
                <button id="btn-cancel-transfers" class="btn danger" style="display:none;">Cancel All</button>
              </div>
              <div id="file-drop-zone" class="drop-zone"><p>Drag & drop files or folders here</p></div>
              <div id="selected-files" class="selected-files"></div>
              <div id="transfer-list" class="transfer-list"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- QR modal -->
      <div id="qr-modal" class="modal"><div class="modal-content glass"><span class="close">&times;</span><div id="qr-code"></div></div></div>

      <footer style="text-align:center;padding:20px;color:#888;border-top:1px solid rgba(255,255,255,.1)">Made by Dibya Jyoti</footer>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="webrtc.js"></script>
  <script src="app.js"></script>
</body>
</html>
